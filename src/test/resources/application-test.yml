spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_batch_fetch_size: 100

  sql:
    init:
      mode: never

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret

jwt:
  secret: test-secret-key-must-be-at-least-64-characters-long-for-hs512-algorithm
  expiration: 86400000

app:
  frontend-url: http://localhost:3000

file:
  upload:
    base-path: /tmp/moretale-test
    base-url: http://localhost:8080/uploads

tts:
  storage:
    path: tts/audio

moretale:
  ai:
    base-url: http://localhost:9999
    api-key: test-key
    callback-base-url: http://localhost:8080
  cors:
    allowed-origins: http://localhost:3000

google:
  cloud:
    credentials:
      location: classpath:gcp-service-account-test.json
    storage:
      bucket: test-bucket

logging:
  level:
    root: warn
    com.moretale: info